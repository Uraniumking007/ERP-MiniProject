<div class="row">
  <div class="col-12">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1>Products</h1>
      <button class="btn btn-primary" ng-click="vm.addProduct()">Add Product</button>
    </div>
  </div>
</div>

<div class="row">
  <div class="col-12">
    <div class="card">
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-striped">
            <thead>
              <tr>
                <th>Name</th>
                <th>Category</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr ng-repeat="product in vm.products">
                <td>{{ product.name }}</td>
                <td>{{ product.category }}</td>
                <td>${{ product.price }}</td>
                <td>{{ product.stock }}</td>
                <td>
                  <span class="badge" ng-class="product.active ? 'bg-success' : 'bg-secondary'">
                    {{ product.active ? 'Active' : 'Inactive' }}
                  </span>
                </td>
                <td>
                  <button class="btn btn-sm btn-info" ng-click="vm.editProduct(product)">Edit</button>
                  <button class="btn btn-sm btn-danger" ng-click="vm.deleteProduct(product._id)">Delete</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        
        <div ng-if="vm.products.length === 0" class="text-center text-muted py-4">
          <p>No products found. Click "Add Product" to create one.</p>
        </div>
      </div>
    </div>
  </div>
</div>
