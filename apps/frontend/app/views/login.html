<div class="row justify-content-center mt-5">
  <div class="col-md-6 col-lg-4">
    <div class="card shadow">
      <div class="card-body">
        <h2 class="card-title text-center mb-4">ERP Login</h2>
        
        <form ng-submit="vm.login()">
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" ng-model="vm.credentials.email" required>
          </div>
          
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" ng-model="vm.credentials.password" required>
          </div>
          
          <div ng-if="vm.error" class="alert alert-danger" role="alert">
            {{ vm.error }}
          </div>
          
          <button type="submit" class="btn btn-primary w-100" ng-disabled="vm.loading">
            <span ng-if="vm.loading">Logging in...</span>
            <span ng-if="!vm.loading">Login</span>
          </button>
        </form>
        
        <div class="text-center mt-3">
          <small class="text-muted">Demo: Use any email/password to login</small>
        </div>
      </div>
    </div>
  </div>
</div>
