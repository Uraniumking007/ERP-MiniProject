<div class="container-fluid py-4">
    <div class="row">
        <div class="col-lg-4">
            <div class="card card-custom mb-4">
                <div class="card-body text-center">
                    <div class="mb-3">
                        <div style="width: 120px; height: 120px; background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; color: white; font-size: 3rem;">
                            <i class="fas fa-user"></i>
                        </div>
                    </div>
                    <h4>{{ dashboard.currentUser.name }}</h4>
                    <p class="text-muted">{{ dashboard.currentUser.email }}</p>
                    <span class="badge badge-info">{{ dashboard.currentUser.role | uppercase }}</span>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card card-custom">
                <div class="card-header-custom">
                    <h5 class="mb-0"><i class="fas fa-user-edit mr-2"></i>Edit Profile</h5>
                </div>
                <div class="card-body">
                    <form>
                        <div class="form-group-custom">
                            <label class="form-label-custom">Full Name</label>
                            <input type="text" class="form-control form-control-custom" 
                                   value="{{ dashboard.currentUser.name }}" readonly>
                        </div>
                        <div class="form-group-custom">
                            <label class="form-label-custom">Email Address</label>
                            <input type="email" class="form-control form-control-custom" 
                                   value="{{ dashboard.currentUser.email }}" readonly>
                        </div>
                        <div class="form-group-custom">
                            <label class="form-label-custom">Role</label>
                            <input type="text" class="form-control form-control-custom" 
                                   value="{{ dashboard.currentUser.role | uppercase }}" readonly>
                        </div>
                        <div class="alert alert-info-custom">
                            <i class="fas fa-info-circle mr-2"></i>
                            Profile editing will be available in the next update.
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
