<div class="auth-container">
    <div class="auth-box">
        <div class="auth-header">
            <i class="fas fa-user-plus fa-3x mb-3"></i>
            <h2 class="auth-title">Create Account</h2>
            <p class="mb-0">Join College ERP today</p>
        </div>
        <div class="auth-body">
            <!-- Loading Spinner -->
            <div class="text-center mb-4" ng-if="auth.isLoading">
                <div class="spinner-custom mx-auto"></div>
                <p class="text-muted mt-3">Creating your account...</p>
            </div>

            <!-- Registration Form -->
            <form ng-submit="auth.register()" ng-if="!auth.isLoading">
                <div class="form-group-custom">
                    <label class="form-label-custom" for="name">
                        <i class="fas fa-user mr-1"></i> Full Name
                    </label>
                    <input type="text" 
                           class="form-control form-control-custom" 
                           id="name" 
                           ng-model="auth.registerData.name"
                           placeholder="Enter your full name"
                           required
                           autofocus>
                </div>

                <div class="form-group-custom">
                    <label class="form-label-custom" for="reg-email">
                        <i class="fas fa-envelope mr-1"></i> Email Address
                    </label>
                    <input type="email" 
                           class="form-control form-control-custom" 
                           id="reg-email" 
                           ng-model="auth.registerData.email"
                           placeholder="Enter your email"
                           required>
                </div>

                <div class="form-group-custom">
                    <label class="form-label-custom" for="role">
                        <i class="fas fa-user-tag mr-1"></i> I am a...
                    </label>
                    <select class="form-control form-control-custom" 
                            id="role" 
                            ng-model="auth.registerData.role"
                            required>
                        <option value="">Select your role</option>
                        <option ng-repeat="role in auth.roles" value="{{ role.value }}">
                            {{ role.label }}
                        </option>
                    </select>
                </div>

                <div class="form-group-custom">
                    <label class="form-label-custom" for="reg-password">
                        <i class="fas fa-lock mr-1"></i> Password
                    </label>
                    <input type="password" 
                           class="form-control form-control-custom" 
                           id="reg-password" 
                           ng-model="auth.registerData.password"
                           placeholder="Create a password (min 6 characters)"
                           required>
                </div>

                <div class="form-group-custom">
                    <label class="form-label-custom" for="confirm-password">
                        <i class="fas fa-lock mr-1"></i> Confirm Password
                    </label>
                    <input type="password" 
                           class="form-control form-control-custom" 
                           id="confirm-password" 
                           ng-model="auth.registerData.confirmPassword"
                           placeholder="Re-enter your password"
                           required>
                </div>

                <div class="alert alert-info-custom">
                    <i class="fas fa-info-circle mr-2"></i>
                    Your password should be at least 6 characters long.
                </div>

                <button type="submit" class="btn btn-action btn-block w-100">
                    <i class="fas fa-user-plus mr-2"></i>Create Account
                </button>
            </form>

            <hr class="my-4">

            <div class="text-center">
                <p class="mb-2">Already have an account?</p>
                <a href="#!/login" class="btn btn-outline-custom btn-sm">
                    <i class="fas fa-sign-in-alt mr-1"></i> Sign In
                </a>
            </div>

            <div class="mt-4 text-center">
                <a href="#!/" class="text-muted">
                    <i class="fas fa-arrow-left mr-1"></i> Back to Home
                </a>
            </div>
        </div>
    </div>
</div>
