<div class="auth-container">
    <div class="auth-box">
        <div class="auth-header">
            <i class="fas fa-graduation-cap fa-3x mb-3"></i>
            <h2 class="auth-title">Welcome Back</h2>
            <p class="mb-0">Sign in to continue to College ERP</p>
        </div>
        <div class="auth-body">
            <!-- Loading Spinner -->
            <div class="text-center mb-4" ng-if="auth.isLoading">
                <div class="spinner-custom mx-auto"></div>
                <p class="text-muted mt-3">Please wait...</p>
            </div>

            <!-- Login Form -->
            <form ng-submit="auth.login()" ng-if="!auth.isLoading">
                <div class="form-group-custom">
                    <label class="form-label-custom" for="email">
                        <i class="fas fa-envelope mr-1"></i> Email Address
                    </label>
                    <input type="email" 
                           class="form-control form-control-custom" 
                           id="email" 
                           ng-model="auth.loginData.email"
                           placeholder="Enter your email"
                           required
                           autofocus>
                </div>

                <div class="form-group-custom">
                    <label class="form-label-custom" for="password">
                        <i class="fas fa-lock mr-1"></i> Password
                    </label>
                    <input type="password" 
                           class="form-control form-control-custom" 
                           id="password" 
                           ng-model="auth.loginData.password"
                           placeholder="Enter your password"
                           required>
                </div>

                <div class="form-group-custom">
                    <div class="custom-control custom-checkbox">
                        <input type="checkbox" 
                               class="custom-control-input" 
                               id="rememberMe"
                               ng-model="auth.loginData.rememberMe">
                        <label class="custom-control-label" for="rememberMe">
                            Remember me for 30 days
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn btn-action btn-block w-100">
                    <i class="fas fa-sign-in-alt mr-2"></i>Sign In
                </button>
            </form>

            <hr class="my-4">

            <div class="text-center">
                <p class="mb-2">Don't have an account?</p>
                <a href="#!/register" class="btn btn-outline-custom btn-sm">
                    <i class="fas fa-user-plus mr-1"></i> Create Account
                </a>
            </div>

            <div class="mt-4 text-center">
                <a href="#!/" class="text-muted">
                    <i class="fas fa-arrow-left mr-1"></i> Back to Home
                </a>
            </div>
        </div>
    </div>
</div>
